version: 2

updates:
  - package-ecosystem: 'terraform'
    directory: '/'
    schedule:
      interval: 'cron'
      # Run every Saturday at 00:00.
      crontab: '0 0 * * 6'
    cooldown:
      default-days: 7

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'cron'
      # Run every Sunday at 00:00.
      crontab: '0 0 * * 0'
    cooldown:
      default-days: 7
